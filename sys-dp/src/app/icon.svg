<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- D: stem + bowl (hollow) -->
  <rect x="4" y="6" width="3.5" height="20" rx="1" fill="white"/>
  <path d="M7.5 6 C7.5 6 18.5 6 18.5 16 C18.5 26 7.5 26 7.5 26" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- P: stem + upper bowl (hollow) -->
  <rect x="21" y="6" width="3" height="20" rx="1" fill="white"/>
  <path d="M24 6 C24 6 30 6 30 11.5 C30 17 24 17 24 17" stroke="white" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Accent dot between D and P -->
  <circle cx="19.5" cy="16" r="1.2" fill="#60a5fa"/>
</svg>
